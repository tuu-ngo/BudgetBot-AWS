<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BudgetBot — AI Money Coach</title>
<style>
  :root {
    --accent: #059669;          /* BudgetBot = emerald */
    --accent-light: #ecfdf5;
    --accent-dark: #047857;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
    --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
    --shadow-lg: 0 10px 30px -10px rgba(15, 23, 42, .15);
    --radius: 12px;
    --radius-sm: 8px;
    --success: #059669;
    --error: #dc2=626;
    --warn: #d97706;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.55;
    color: var(--text); background: var(--bg); min-height: 100vh;
  }
  .topbar {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: white;
    padding: 1.25rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 2rem; flex-wrap: wrap;
    box-shadow: var(--shadow-lg);
  }
  .brand { display: flex; align-items: center; gap: 0.9rem; }
  .brand .logo {
    width: 44px; height: 44px;
    background: rgba(255, 255, 255, .18);
    border-radius: 10px;
    display: grid; place-items: center; font-size: 22px;
  }
  .brand h1 { margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -.01em; }
  .brand p { margin: 0; opacity: .85; font-size: 0.82rem; }
  .status-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .pill {
    background: rgba(255, 255, 255, .15);
    padding: 0.25rem 0.6rem; border-radius: 100px;
    font-size: 0.72rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .pill.local { background: rgba(255, 191, 36, .25); }
  .pill.remote { background: rgba(34, 197, 94, .35); }
  .container {
    max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
    display: grid; gap: 1.25rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 1rem; gap: 1rem;
  }
  .card-header h2 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em; }
  .card-header .step {
    background: var(--accent-light); color: var(--accent-dark);
    width: 26px; height: 26px; border-radius: 100px;
    display: inline-grid; place-items: center;
    font-size: 0.78rem; font-weight: 600; margin-right: 0.6rem;
  }
  .card-header .meta { color: var(--muted); font-size: 0.82rem; }
  .drop {
    border: 2px dashed var(--border); border-radius: var(--radius-sm);
    padding: 1.75rem 1rem; text-align: center;
    transition: all .15s ease; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .drop:hover, .drop.dragover { border-color: var(--accent); background: var(--accent-light); }
  .drop svg { width: 38px; height: 38px; color: var(--muted); margin-bottom: 0.5rem; }
  .drop p { margin: 0.2rem 0; color: var(--muted); font-size: 0.92rem; }
  .drop .browse { color: var(--accent); font-weight: 500; text-decoration: underline; }
  .drop input { display: none; }
  .input-row { display: flex; gap: 0.6rem; align-items: center; }
  input[type=text], input[type=month] {
    flex: 1; padding: 0.6rem 0.85rem;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font: inherit; color: var(--text); background: white;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(5, 150, 105, .12); }
  button {
    font: inherit; border: 0; border-radius: var(--radius-sm);
    padding: 0.6rem 1.1rem; cursor: pointer; font-weight: 500;
    transition: background .15s, transform .05s;
  }
  button.primary { background: var(--accent); color: white; }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:disabled { background: var(--muted); cursor: not-allowed; }
  button.ghost {
    background: transparent; color: var(--accent);
    border: 1px solid var(--border);
  }
  button.ghost:hover { background: var(--accent-light); border-color: var(--accent); }

  /* ---------- Summary ---------- */
  .summary-totals {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1rem;
  }
  .total-tile {
    padding: 0.9rem 1rem;
    background: linear-gradient(180deg, var(--accent-light), white);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .total-tile .label { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: .04em; }
  .total-tile .value { font-size: 1.25rem; font-weight: 600; margin-top: 0.2rem; }
  .total-tile.income .value { color: var(--accent); }
  .total-tile.expense .value { color: var(--error); }
  .total-tile.net .value { color: var(--text); }

  .chart { display: grid; gap: 0.5rem; margin-top: 0.5rem; }
  .bar-row {
    display: grid; grid-template-columns: 100px 1fr 90px; align-items: center; gap: 0.6rem;
    font-size: 0.86rem;
  }
  .bar-row .cat { font-weight: 500; }
  .bar-row .track {
    height: 10px; background: var(--border); border-radius: 100px; overflow: hidden;
  }
  .bar-row .fill {
    height: 100%; background: var(--accent); border-radius: 100px;
    transition: width .4s ease;
  }
  .bar-row.income .fill { background: var(--accent); }
  .bar-row.expense .fill { background: #ef4444; }
  .bar-row .amt {
    text-align: right; font-family: ui-monospace, Menlo, monospace;
    font-size: 0.82rem; color: var(--muted);
  }

  /* ---------- Transactions table ---------- */
  table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
  th, td { text-align: left; padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 0.78rem; text-transform: uppercase; letter-spacing: .03em; }
  td.amt { text-align: right; font-family: ui-monospace, Menlo, monospace; }
  td.amt.neg { color: var(--error); }
  td.amt.pos { color: var(--accent); }
  td .cat-pill {
    display: inline-block;
    padding: 0.15rem 0.5rem; border-radius: 100px;
    background: var(--accent-light); color: var(--accent-dark);
    font-size: 0.72rem; font-weight: 500;
  }

  .empty { text-align: center; color: var(--muted); padding: 1.5rem; font-size: 0.9rem; }
  .muted { color: var(--muted); }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--accent-light); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toasts { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: grid; gap: 0.5rem; }
  .toast {
    background: white; border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm); padding: 0.7rem 1rem;
    box-shadow: var(--shadow-lg);
    min-width: 220px; max-width: 340px; font-size: 0.88rem;
    animation: slidein .25s ease-out;
  }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--error); }
  .toast.warn { border-left-color: var(--warn); }
  @keyframes slidein { from { transform: translateX(120%); } to { transform: translateX(0); } }

  details { font-size: 0.85rem; }
  details > summary { cursor: pointer; color: var(--muted); padding: 0.3rem 0; }
  details pre {
    background: #0f172a; color: #e2e8f0; padding: 0.8rem; border-radius: var(--radius-sm);
    font-size: 0.78rem; overflow: auto; max-height: 240px;
    font-family: ui-monospace, Menlo, monospace;
  }
  @media (max-width: 640px) {
    .topbar { padding: 1rem; }
    .container { padding: 1rem; }
    .summary-totals { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="logo">💰</span>
    <div>
      <h1>BudgetBot</h1>
      <p>AI Money Coach — upload statement, see where your money went</p>
    </div>
  </div>
  <div class="status-pills" id="status-pills">
    <span class="pill"><span class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:white;"></span> loading…</span>
  </div>
</header>

<main class="container">

  <section class="card">
    <div class="card-header">
      <h2><span class="step">1</span>Upload bank statement</h2>
      <span class="meta">CSV: date,description,amount</span>
    </div>
    <div class="input-row">
      <label class="drop" id="drop" style="flex: 1; margin: 0;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 7.5m0 0L7.5 12M12 7.5v9"/>
        </svg>
        <p><strong>Drag a CSV here</strong> or <span class="browse">click to browse</span></p>
        <p style="font-size:0.78rem;">Try <code>sample_data/bank_statement_q2_2026.csv</code></p>
        <input type="file" id="file" accept=".csv,.txt">
      </label>
      <button class="primary" id="upload-btn" onclick="triggerUpload()" style="white-space: nowrap;">Upload</button>
    </div>
    <div id="upload-result"></div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2><span class="step">2</span>Spending summary</h2>
      <span class="meta">Optional month filter</span>
    </div>
    <div class="input-row">
      <input type="month" id="month" placeholder="YYYY-MM">
      <button class="primary" id="sum-btn" onclick="summary()">Get summary</button>
    </div>
    <div id="summary-out" style="margin-top:1rem;"><div class="empty">Run a summary after uploading.</div></div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2><span class="step">3</span>All transactions</h2>
      <button class="ghost" onclick="loadTxns()">Refresh</button>
    </div>
    <div id="txns-out"><div class="empty">No transactions yet.</div></div>
  </section>

  <details>
    <summary>Raw API responses (debug)</summary>
    <pre id="debug-log">No requests yet.</pre>
  </details>

</main>

<div class="toasts" id="toasts"></div>

<script>
const API_BASE = (window.API_BASE || new URLSearchParams(location.search).get('api') || '').replace(/\/$/, '');
const USER_ID = (new URLSearchParams(location.search).get('user') || 'test-user-001');

function $(id) { return document.getElementById(id); }
function fmt(n) { return new Intl.NumberFormat('en-US').format(Math.round(n)); }
function fmtCompact(n) {
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (abs >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return fmt(n);
}
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.style.opacity = '0', 2500);
  setTimeout(() => el.remove(), 3000);
}
function logDebug(label, data) {
  const old = $('debug-log').textContent === 'No requests yet.' ? '' : $('debug-log').textContent;
  $('debug-log').textContent = `── ${new Date().toLocaleTimeString()} — ${label} ──\n${JSON.stringify(data, null, 2)}\n\n${old}`.slice(0, 3000);
}

async function call(path, opts={}) {
  opts.headers = Object.assign({'X-User-Id': USER_ID}, opts.headers || {});
  const r = await fetch(API_BASE + path, opts);
  const text = await r.text();
  let body; try { body = JSON.parse(text); } catch { body = text; }
  logDebug(`${opts.method || 'GET'} ${path}`, body);
  return {ok: r.ok, status: r.status, body};
}

async function loadStatus() {
  const res = await call('/health');
  if (!res.ok) { $('status-pills').innerHTML = '<span class="pill error">backend offline</span>'; return; }
  $('status-pills').innerHTML = Object.entries(res.body.backends)
    .map(([k, v]) => `<span class="pill ${v === 'local' ? 'local' : 'remote'}">${k}: ${v}</span>`)
    .join('');
}

// ---------- Upload ----------
const drop = $('drop'), fileInput = $('file');

function triggerUpload() {
  fileInput.click();
}

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('dragover');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) doUpload(e.target.files[0]); });

async function doUpload(file) {
  $('upload-result').innerHTML = `<p class="muted" style="margin:0.8rem 0 0;"><span class="spinner"></span> Categorizing ${file.name}…</p>`;
  const fd = new FormData(); fd.append('file', file);
  const res = await call('/upload', {method: 'POST', body: fd});
  if (!res.ok) {
    toast(`Upload failed: ${res.body.detail || res.status}`, 'error');
    $('upload-result').innerHTML = `<p style="color:var(--error); margin:0.8rem 0 0;">${res.body.detail || 'Upload failed'}</p>`;
    return;
  }
  const b = res.body;
  $('upload-result').innerHTML = `
    <div style="margin-top:0.8rem; padding:0.8rem; background:#f0fdf4; border-radius:var(--radius-sm); border-left:3px solid var(--success); font-size:0.88rem;">
      ✓ <strong>${b.filename}</strong> — ${b.rows_inserted} of ${b.rows_parsed} rows inserted &amp; categorized
    </div>`;
  toast(`Categorized ${b.rows_inserted} transactions`, 'success');
  summary();
  loadTxns();
}

// ---------- Summary ----------
async function summary() {
  const m = $('month').value.trim();
  const url = '/summary' + (m ? '?month=' + encodeURIComponent(m) : '');
  $('summary-out').innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  const res = await call(url);
  if (!res.ok) { $('summary-out').innerHTML = `<p style="color:var(--error);">${res.body.detail || 'Error'}</p>`; return; }
  const {total_spend, by_category, top_3_drivers} = res.body;
  if (!by_category || !Object.keys(by_category).length) {
    $('summary-out').innerHTML = '<div class="empty">No data — upload a statement first.</div>';
    return;
  }
  const incomes = Object.entries(by_category).filter(([, v]) => v.total > 0);
  const expenses = Object.entries(by_category).filter(([, v]) => v.total < 0);
  const incomeTotal = incomes.reduce((s, [, v]) => s + v.total, 0);
  const expenseTotal = expenses.reduce((s, [, v]) => s + Math.abs(v.total), 0);
  const net = incomeTotal - expenseTotal;
  const maxBar = Math.max(...Object.values(by_category).map(v => Math.abs(v.total)), 1);

  // Sort: expenses largest first, then incomes
  const sorted = [
    ...expenses.sort((a, b) => a[1].total - b[1].total),
    ...incomes.sort((a, b) => b[1].total - a[1].total),
  ];

  $('summary-out').innerHTML = `
    <div class="summary-totals">
      <div class="total-tile income"><div class="label">Income</div><div class="value">${fmtCompact(incomeTotal)}</div></div>
      <div class="total-tile expense"><div class="label">Expenses</div><div class="value">${fmtCompact(expenseTotal)}</div></div>
      <div class="total-tile net"><div class="label">Net</div><div class="value" style="color:${net >= 0 ? 'var(--accent)' : 'var(--error)'};">${net >= 0 ? '+' : ''}${fmtCompact(net)}</div></div>
    </div>
    <div class="chart">
      ${sorted.map(([cat, v]) => {
        const pct = Math.round(Math.abs(v.total) / maxBar * 100);
        const cls = v.total >= 0 ? 'income' : 'expense';
        return `<div class="bar-row ${cls}">
          <div class="cat">${cat} <span class="muted" style="font-size:.78rem;">(${v.count})</span></div>
          <div class="track"><div class="fill" style="width:${pct}%"></div></div>
          <div class="amt">${v.total >= 0 ? '+' : ''}${fmtCompact(v.total)}</div>
        </div>`;
      }).join('')}
    </div>
    ${top_3_drivers && top_3_drivers.length ? `
      <p class="muted" style="font-size:0.82rem; margin-top:1rem;">
        🎯 Top drivers: ${top_3_drivers.map(d => `<strong>${d.category}</strong> (${fmtCompact(d.total)})`).join(', ')}
      </p>` : ''
    }
  `;
}

// ---------- Transactions ----------
async function loadTxns() {
  $('txns-out').innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  const res = await call('/transactions');
  if (!res.ok || !res.body.transactions || !res.body.transactions.length) {
    $('txns-out').innerHTML = '<div class="empty">No transactions yet.</div>';
    return;
  }
  const t = res.body.transactions;
  $('txns-out').innerHTML = `
    <table>
      <thead><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right;">Amount</th></tr></thead>
      <tbody>
        ${t.slice(0, 50).map(r => `
          <tr>
            <td>${r.date}</td>
            <td>${(r.description || '').slice(0, 50)}</td>
            <td><span class="cat-pill">${r.category}</span></td>
            <td class="amt ${r.amount < 0 ? 'neg' : 'pos'}">${r.amount >= 0 ? '+' : ''}${fmt(r.amount)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    ${t.length > 50 ? `<p class="muted" style="font-size:0.78rem; margin-top:0.5rem;">Showing 50 of ${t.length}</p>` : ''}
  `;
}

loadStatus();
</script>
</body>
</html>
