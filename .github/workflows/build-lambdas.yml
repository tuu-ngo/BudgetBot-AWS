name: Build Backend Lambdas Only

on:
  push:
    branches:
      - cicd-build-only

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Current directory:"
          pwd

          echo "Root files:"
          ls -la

          echo "src folder:"
          ls -la src

          echo "src/lambdas folder:"
          ls -la src/lambdas

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Lambda package
        run: |
          rm -rf package lambda_package.zip
          mkdir -p package

          echo "Installing Python dependencies from requirements.txt..."
          pip install -r requirements.txt -t package

          echo "Copying src folder into package..."
          cp -r src package/

          echo "Creating lambda_package.zip..."
          cd package
          zip -r ../lambda_package.zip .

      - name: Verify package content
        run: |
          echo "Listing first 150 files in lambda_package.zip:"
          unzip -l lambda_package.zip | head -150

          echo "Checking required Lambda files:"
          unzip -l lambda_package.zip | grep "src/lambdas/lambda_api.py"
          unzip -l lambda_package.zip | grep "src/lambdas/lambda_parser.py"
          unzip -l lambda_package.zip | grep "src/lambdas/lambda_chat.py"
          unzip -l lambda_package.zip | grep "src/lambdas/lambda_budget.py"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-build-only
          path: lambda_package.zip